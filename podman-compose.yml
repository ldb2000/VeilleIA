version: "3.8"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: veillia-backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      - DATABASE_URL=sqlite:///./data/sql_app.db
    volumes:
      - ./data:/app/data
      - ./backend/app:/app/app
      - ${HOME}/.gemini:/root/.gemini:ro
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: veillia-frontend
    ports:
      - "5173:5173"
    env_file:
      - ./backend/.env
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - backend
    restart: unless-stopped
